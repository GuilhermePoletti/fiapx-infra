# =============================================================================
# FIAP X — Docker Compose (Infraestrutura Local)
# =============================================================================
#
#  SEGURANÇA:
#   Todas as senhas vêm do arquivo .env (que NÃO vai para o Git).
#   O Docker Compose lê automaticamente o .env na mesma pasta.
#   Sintaxe: ${NOME_DA_VARIAVEL} → é substituída pelo valor do .env
#
# COMO USAR:
#   Subir tudo:        docker compose up -d
#   Ver status:        docker compose ps
#   Ver logs:          docker compose logs -f nome-do-servico
#   Derrubar tudo:     docker compose down
#   Derrubar + limpar: docker compose down -v  (apaga dados dos volumes!)
#
# =============================================================================

services:
  # ===========================================================================
  # POSTGRES — Banco de dados principal (nossos microsserviços)
  # ===========================================================================
  # Este é o Postgres que os NOSSOS serviços usam (Auth, Manager, Notifier).
  # Na primeira vez que sobe, executa o init.sql que cria 3 bancos separados.
  #
  # ATENÇÃO: O init.sql só roda na PRIMEIRA execução (quando o volume está vazio).
  # Se precisar recriar os bancos, apague o volume:
  #   docker compose down -v && docker compose up -d
  #
  postgres:
    image: postgres:16-alpine
    container_name: fx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fx-network

  # ===========================================================================
  # KONG-DB — Banco de dados dedicado ao Kong API Gateway
  # ===========================================================================
  # Banco isolado para o Kong guardar suas configurações (rotas, plugins, etc).
  # Porta 5433 na máquina local para não conflitar com o Postgres principal.
  #
  kong-db:
    image: postgres:16-alpine
    container_name: fx-kong-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${KONG_DB_USER}
      POSTGRES_PASSWORD: ${KONG_DB_PASSWORD}
      POSTGRES_DB: ${KONG_DB_NAME}
    ports:
      - "${KONG_DB_PORT}:5432"
    volumes:
      - kong_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KONG_DB_USER} -d ${KONG_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fx-network

  # ===========================================================================
  # REDIS — Cache e Adapter para Socket.io (futuro)
  # ===========================================================================
  #
  redis:
    image: redis:7-alpine
    container_name: fx-redis
    restart: unless-stopped
    # --requirepass: obriga autenticação para conectar ao Redis
    # Em produção, Redis sem senha é uma vulnerabilidade crítica
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      # -a = autenticação com senha para o healthcheck funcionar
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fx-network

  # ===========================================================================
  #  RABBITMQ — Mensageria (Event-Driven Architecture)
  # ===========================================================================
  # RabbitMQ é o "carteiro" do sistema. Ele recebe mensagens dos Producers
  # (Manager) e entrega nas filas dos Consumers (Worker, Notifier).
  #
  # IMAGEM: rabbitmq:3-management
  #   - "3" = versão 3.x do RabbitMQ
  #   - "management" = inclui o plugin de interface web (porta 15672)
  #     Sem "-management", você não teria a UI para monitorar filas.
  #
  # PORTAS:
  #   5672  = AMQP (protocolo de mensageria — usado pelos serviços Node.js)
  #   15672 = Management UI (interface web — acesse no navegador)
  #
  # EXCHANGE QUE USAREMOS:
  #   Nome: video_events | Tipo: topic
  #   Routing Keys: video.uploaded, video.processed, video.failed
  #   (a exchange será criada programaticamente pelos serviços na Fase 3/4)
  #
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fx-rabbitmq
    restart: unless-stopped
    environment:
      # Credenciais do usuário administrador do RabbitMQ
      # Usadas para login na Management UI e para conexão AMQP dos serviços
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      # AMQP: protocolo de mensageria
      # Os serviços NestJS conectam em: amqp://user:pass@rabbitmq:5672
      - "${RABBITMQ_PORT}:5672"
      # Management UI: interface web para monitorar filas e mensagens
      # Acesse: http://localhost:15672 (login com as credenciais acima)
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    volumes:
      # Persistência: mensagens na fila sobrevivem a restarts do container
      # Sem volume, se o RabbitMQ restartar, mensagens pendentes seriam perdidas
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      # rabbitmq-diagnostics check_port_connectivity verifica se o RabbitMQ
      # está aceitando conexões AMQP (mais confiável que apenas checar o processo)
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
      # start_period: dá 30s para o RabbitMQ inicializar antes de começar a checar
      # RabbitMQ demora mais para iniciar que Postgres/Redis
      start_period: 30s
    networks:
      - fx-network

  # ===========================================================================
  #  MINIO — Object Storage (Compatível com AWS S3)
  # ===========================================================================
  # MinIO é um servidor de armazenamento de arquivos que imita a API do S3.
  # Usamos para guardar:
  #   - Vídeos brutos enviados pelo usuário (bucket: raw-videos)
  #   - ZIPs processados pelo Worker (bucket: processed-files)
  #
  # PORTAS:
  #   9000 = API S3 (os serviços Node.js usam essa porta para upload/download)
  #   9001 = Console Web (interface gráfica para visualizar arquivos)
  #
  # COMANDO: "server /data --console-address :9001"
  #   - "server /data" → inicia o servidor usando /data como raiz
  #   - "--console-address :9001" → fixa a porta do console (senão é aleatória)
  #
  minio:
    image: minio/minio:latest
    container_name: fx-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      # Usa wget nativo da imagem alpine em vez de curl
      # /minio/health/live é o endpoint oficial de healthcheck do MinIO
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - fx-network

  # ===========================================================================
  #  MINIO-SETUP — Container auxiliar para criar buckets automaticamente
  # ===========================================================================
  # Este container é TEMPORÁRIO. Ele:
  #   1. Espera o MinIO ficar pronto (healthcheck)
  #   2. Executa o script setup-buckets.sh
  #   3. Cria os 2 buckets (raw-videos, processed-files)
  #   4. MORRE (não fica rodando — é só um "ajudante" de setup)
  #
  # IMAGEM: minio/mc (MinIO Client)
  #   É uma ferramenta de linha de comando para interagir com o MinIO.
  #   Funciona como o "aws-cli" mas para MinIO.
  #
  minio-setup:
    image: minio/mc:latest
    container_name: fx-minio-setup
    # Passa as credenciais e nomes dos buckets como variáveis de ambiente
    # O script setup-buckets.sh lê essas variáveis com ${MINIO_ROOT_USER}, etc.
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW}
      MINIO_BUCKET_PROCESSED: ${MINIO_BUCKET_PROCESSED}
    # Monta nosso script dentro do container e executa com "sh"
    # O "entrypoint" sobrescreve o comando padrão da imagem
    volumes:
      - ./infra/minio/setup-buckets.sh:/setup-buckets.sh:ro
    entrypoint: ["/bin/sh", "/setup-buckets.sh"]
    # depends_on com condition: garante que o MinIO está HEALTHY antes de rodar
    # Sem isso, o script tentaria criar buckets num MinIO que ainda está iniciando
    depends_on:
      minio:
        condition: service_healthy
    # restart: "no" → roda UMA vez e para (não reinicia após concluir)
    restart: "no"
    networks:
      - fx-network

  # ===========================================================================
  # MAILHOG — Servidor SMTP fake para capturar e-mails em desenvolvimento
  # ===========================================================================
  # O Notifier envia e-mails para a porta 1025 (SMTP).
  # O Mailhog captura e exibe na interface web na porta 8025.
  # Nenhum e-mail é enviado de verdade.
  #
  mailhog:
    image: mailhog/mailhog:latest
    container_name: fx-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT}:1025"
      - "${MAILHOG_UI_PORT}:8025"
    networks:
      - fx-network

  # ===========================================================================
  # Kong Migrations — Cria as tabelas no kong-db (executa uma vez e sai)
  # ===========================================================================
  kong-migrations:
    image: kong:3.9
    container_name: fx-kong-migrations
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_PORT: "5432"
      KONG_PG_USER: ${KONG_DB_USER}
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD}
      KONG_PG_DATABASE: ${KONG_DB_NAME}
    command: kong migrations bootstrap
    depends_on:
      kong-db:
        condition: service_healthy
    restart: "no"
    networks:
      - fx-network

  # ===========================================================================
  # Kong — API Gateway (porteiro do sistema)
  # ===========================================================================
  # Portas:
  #   8000 = Proxy (recebe requests dos clientes)
  #   8001 = Admin API (para configurar rotas e plugins via REST)
  kong:
    image: kong:3.9
    container_name: fx-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_PORT: "5432"
      KONG_PG_USER: ${KONG_DB_USER}
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD}
      KONG_PG_DATABASE: ${KONG_DB_NAME}
      # Porta do proxy: recebe requests dos clientes
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      # Porta admin: API REST para configurar rotas e plugins
      KONG_ADMIN_LISTEN: ${KONG_ADMIN_LISTEN}
      # Nivel de log: debug | info | notice | warn | error
      KONG_LOG_LEVEL: ${KONG_LOG_LEVEL}
    ports:
      - "${KONG_PROXY_PORT}:8000"
      - "${KONG_ADMIN_PORT}:8001"
    depends_on:
      kong-db:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - fx-network

  # ===========================================================================
  # Swagger UI — Documentacao unificada de todas as APIs
  # ===========================================================================
  # Renderiza documentacao OpenAPI interativa ("Try it out").
  # Centraliza Auth + Manager num unico painel.
  # As URLs das specs serao resolvidas quando os servicos estiverem rodando (Fase 2+).
  #
  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: fx-swagger-ui
    restart: unless-stopped
    environment:
      CONFIG_URL: /config/swagger-config.json
    ports:
      - "${SWAGGER_PORT}:8080"
    volumes:
      - ./infra/swagger/swagger-config.json:/usr/share/nginx/html/config/swagger-config.json:ro
    depends_on:
      kong:
        condition: service_healthy
    networks:
      - fx-network

  # ===========================================================================
  # KONG-SETUP — Container auxiliar que configura rotas e plugins do Kong
  # ===========================================================================
  # Similar ao minio-setup: roda UMA vez após o Kong estar pronto.
  # Usa a Admin API (porta 8001) para registrar:
  #   - Services (auth, manager)
  #   - Routes (/api/auth, /api/videos)
  #   - Plugin JWT na rota do Manager
  #   - Consumer + JWT Credential
  #
  kong-setup:
    image: alpine:3.19
    container_name: fx-kong-setup
    environment:
      KONG_ADMIN_URL: http://kong:8001
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
    volumes:
      - ./infra/kong/setup-kong.sh:/setup-kong.sh:ro
    entrypoint: ["/bin/sh", "/setup-kong.sh"]
    depends_on:
      kong:
        condition: service_healthy
    restart: "no"
    networks:
      - fx-network

  # ===========================================================================
  # AUTH SERVICE — Contexto de Identidade e Acesso (NestJS)
  # ===========================================================================
  # Responsavel por registro de usuarios e login (gera JWT).
  # Conecta ao banco auth_db no Postgres principal.
  #
  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: fx-auth
    restart: unless-stopped
    profiles:
      - services
    environment:
      NODE_ENV: development
      AUTH_SERVICE_PORT: ${AUTH_SERVICE_PORT}
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      JWT_ISSUER: ${JWT_ISSUER}
    ports:
      - "${AUTH_SERVICE_PORT}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fx-network

  # ===========================================================================
  # MANAGER SERVICE — Contexto de Ciclo de Vida do Vídeo (NestJS)
  # ===========================================================================
  # Responsável por upload, listagem, status e download de vídeos.
  # Conecta ao video_db (Postgres), MinIO (storage) e RabbitMQ (mensageria).
  #
  manager:
    build:
      context: ./services/manager
      dockerfile: Dockerfile
    container_name: fx-manager
    restart: unless-stopped
    profiles:
      - services
    environment:
      NODE_ENV: development
      MANAGER_SERVICE_PORT: ${MANAGER_SERVICE_PORT}
      VIDEO_DATABASE_URL: ${VIDEO_DATABASE_URL}
      MINIO_ENDPOINT: minio
      MINIO_API_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW}
      MINIO_BUCKET_PROCESSED: ${MINIO_BUCKET_PROCESSED}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    ports:
      - "${MANAGER_SERVICE_PORT}:3002"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - fx-network

  # ===========================================================================
  # WORKER SERVICE — Processamento de Vídeo (FFmpeg + ZIP)
  # ===========================================================================
  # Daemon standalone que escuta RabbitMQ e processa vídeos.
  # NÃO expõe porta HTTP — apenas consome mensagens da fila.
  #
  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    container_name: fx-worker
    restart: unless-stopped
    profiles:
      - services
    environment:
      NODE_ENV: development
      MINIO_ENDPOINT: minio
      MINIO_API_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW}
      MINIO_BUCKET_PROCESSED: ${MINIO_BUCKET_PROCESSED}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - fx-network

  # ===========================================================================
  # NOTIFIER SERVICE — Envio de E-mails (Nodemailer + Mailhog)
  # ===========================================================================
  # Daemon standalone que escuta RabbitMQ e envia notificações por e-mail.
  # Conecta ao Mailhog (SMTP fake) em desenvolvimento.
  #
  notifier:
    build:
      context: ./services/notifier
      dockerfile: Dockerfile
    container_name: fx-notifier
    restart: unless-stopped
    profiles:
      - services
    environment:
      NODE_ENV: development
      NOTIFICATION_DATABASE_URL: ${NOTIFICATION_DATABASE_URL}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: noreply@fiapx.com
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - fx-network

# =============================================================================
# VOLUMES — Persistência de dados entre reinicializações
# =============================================================================
volumes:
  postgres_data:
    name: fx-postgres-data
  kong_data:
    name: fx-kong-data
  redis_data:
    name: fx-redis-data
  rabbitmq_data:
    name: fx-rabbitmq-data
  minio_data:
    name: fx-minio-data

# =============================================================================
# NETWORKS — Rede interna para comunicação entre containers
# =============================================================================
networks:
  fx-network:
    name: fx-network
    driver: bridge
