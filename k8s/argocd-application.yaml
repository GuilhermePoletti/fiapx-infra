apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fiapx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/GuilhermePoletti/fiapx-infra.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: fiapx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
