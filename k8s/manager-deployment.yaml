apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager
  namespace: fiapx
  labels:
    app: manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: manager
  template:
    metadata:
      labels:
        app: manager
    spec:
      initContainers:
        - name: prisma-migrate
          image: fiapx-manager:latest
          imagePullPolicy: IfNotPresent
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: VIDEO_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fiapx-secrets
                  key: VIDEO_DATABASE_URL
      containers:
        - name: manager
          image: fiapx-manager:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: NODE_ENV
              value: production
            - name: MANAGER_SERVICE_PORT
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: MANAGER_SERVICE_PORT
            - name: VIDEO_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fiapx-secrets
                  key: VIDEO_DATABASE_URL
            - name: MINIO_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: MINIO_ENDPOINT
            - name: MINIO_API_PORT
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: MINIO_API_PORT
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: fiapx-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fiapx-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_BUCKET_RAW
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: MINIO_BUCKET_RAW
            - name: MINIO_BUCKET_PROCESSED
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: MINIO_BUCKET_PROCESSED
            - name: RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: RABBITMQ_HOST
            - name: RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: fiapx-config
                  key: RABBITMQ_PORT
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: fiapx-secrets
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: fiapx-secrets
                  key: RABBITMQ_DEFAULT_PASS
          readinessProbe:
            httpGet:
              path: /api-docs
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: manager
  namespace: fiapx
spec:
  selector:
    app: manager
  ports:
    - port: 3002
      targetPort: 3002
